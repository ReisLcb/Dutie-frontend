<ion-content [fullscreen]="true">
  <div class="bola">.</div>
  <div id="cadastroForm">
      <form [formGroup]="usuarioForm">
          <ion-list>
            <ion-item>
              <ion-input placeholder="Nome" fill="solid" formControlName="nome" color="tertiary"></ion-input>
            </ion-item>
          <br>
            <ion-item>
              <ion-input placeholder="Nome de usuário" fill="solid" formControlName="nome_de_usuario"></ion-input>
            </ion-item>
          <br>
          <ion-item>
            <ion-label>Data de Nascimento</ion-label>
            <ion-datetime-button datetime="datetime" />
          </ion-item>
              <ion-modal [keepContentsMounted]="true">
                <ng-template>
                  <ion-datetime
                    id="datetime"
                    presentation="date"
                    formControlName="data_nascimento"
                    [formatOptions]="{
                  date: {
                    year: 'numeric',
                    month: 'long',
                    day: '2-digit',
                  },
                }"
                  ></ion-datetime>
                </ng-template>
              </ion-modal>
          </ion-list>

          <ion-item>
            <ion-input placeholder="E-mail" [counter]="true" errorText="E-mail inválido" formControlName="email" color="tertiary"></ion-input>
          </ion-item>
          <br>
          <ion-item>
            <ion-input placeholder="Senha" type="password" label-placement="floating" fill="solid" formControlName="senha"></ion-input>
          </ion-item>
      </form>
<br>
<br>
      <ion-button (click)="cadastrar()" fill="outline" [disabled]="!usuarioForm.valid">
        Cadastrar
      </ion-button>
    </div>
    <br>
</ion-content>
